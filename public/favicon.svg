<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square: ocean-blue gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0052cc"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- ── Body (torso) ── -->
  <ellipse cx="32" cy="44" rx="13" ry="14" fill="#22d3ee"/>
  <!-- Belly -->
  <ellipse cx="32" cy="46" rx="8" ry="9" fill="url(#belly)"/>

  <!-- ── Head ── -->
  <ellipse cx="32" cy="28" rx="12" ry="11" fill="#22d3ee"/>
  <!-- Snout / beak -->
  <ellipse cx="42" cy="31" rx="6" ry="3.5" fill="#22d3ee"/>
  <!-- Smile -->
  <path d="M38 33 Q41 35.5 44 33" stroke="#0e7490" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- Eye -->
  <circle cx="37" cy="27" r="2.4" fill="white"/>
  <circle cx="37.6" cy="27" r="1.3" fill="#1e3a5f"/>
  <circle cx="38.1" cy="26.3" r="0.45" fill="white"/>

  <!-- ── Fin (left/back) ── -->
  <ellipse cx="21" cy="37" rx="5" ry="9" fill="#06b6d4" transform="rotate(-15 21 37)"/>

  <!-- ── Tail fluke ── -->
  <path d="M22 55 Q16 60 13 56 Q18 52 20 50 Z" fill="#06b6d4"/>
  <path d="M22 55 Q28 61 31 57 Q27 52 20 50 Z" fill="#06b6d4"/>

  <!-- ── Graduation cap ── -->
  <!-- Board (mortarboard top) -->
  <rect x="20" y="14" width="22" height="3.5" rx="1.5" fill="#1e293b"/>
  <!-- Cap base (band around head) -->
  <rect x="23" y="17" width="16" height="3" rx="1.5" fill="#334155"/>
  <!-- Tassel -->
  <line x1="39" y1="14" x2="42" y2="20" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="42" cy="21" r="1.5" fill="#f59e0b"/>

  <!-- ── Gown collar hint ── -->
  <path d="M24 40 Q32 36 40 40 L38 44 Q32 41 26 44 Z" fill="#1e293b" opacity="0.85"/>
  <path d="M30 40 L32 44 L34 40" fill="#f59e0b" opacity="0.9"/>
</svg>